spring.application.name=workflow

# DB (PostgreSQL + PostGIS)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/unispace}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:}}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
# Let Hibernate determine the dialect from JDBC metadata.
# (Avoid hard-coding a dialect class name that may differ across Hibernate versions.)
# spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Security (require basic auth for non-GET /api/**)
app.security.write-auth-enabled=${APP_SECURITY_WRITE_AUTH_ENABLED:true}
app.security.admin-username=${APP_ADMIN_USER:admin}
app.security.admin-password=${APP_ADMIN_PASSWORD:}

# Actuator / health probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Include request id from MDC in logs
logging.pattern.level=%5p [req:%X{requestId:-}]
