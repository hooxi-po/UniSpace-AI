services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: unispace-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: unispace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - unispace_postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unispace"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  unispace_postgis_data:
